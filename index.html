<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descriptive Prep Today</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: 700;
            color: #0d6efd !important;
        }
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-pen-fancy me-2"></i>Descriptive PrepToday
            </a>
            <div class="ms-auto">
                <a href="https://t.me/DescriptivePrep" target="_blank" class="btn btn-primary btn-sm rounded-pill">
                    <i class="fab fa-telegram me-1"></i>Join our Telegram
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero / Welcome Header -->
    <header class="bg-dark text-white text-center py-5 mb-4">
        <div class="container">
            <h1 class="display-4 fw-bold">FREE PRACTICE PLATFORM</h1>
            <p class="lead mb-0">Master your descriptive tests with specialized mock interfaces and tools.</p>
        </div>
    </header>

    <!-- 1. COMPONENT PLACEHOLDERS (The holes where code will inject) -->
    <div id="practice-placeholder"></div>
    <div id="offers-placeholder"></div>
    <div id="mocks-placeholder"></div>
    <div id="tracker-placeholder"></div>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 Descriptive PrepToday. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 2. SCRIPT TO AUTOMATICALLY LOAD THE PARTS -->
    <script>
        function loadSection(elementId, filePath) {
            fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('Could not load ' + filePath);
                    return response.text();
                })
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                })
                .catch(error => console.error('Error loading component:', error));
        }

        // Run as soon as the page finishes reading the structure
        // Run as soon as the page finishes reading the structure
        document.addEventListener("DOMContentLoaded", () => {
            loadSection("practice-placeholder", "components/practice.html");
            loadSection("offers-placeholder", "components/offer.html");  // Changed from offers.html to offer.html
            loadSection("mocks-placeholder", "components/mock.html");    // Changed from mocks.html to mock.html
            loadSection("tracker-placeholder", "components/tracker.html");
        });
    </script>
</body>
</html>
