<section id="tracker" class="py-5 bg-light">
    <div class="container">
        <h2>TOOLS</h2>
        <div class="row g-4 mt-2">
            <!-- Typing Speed Test -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title">Typing Speed Test</h5>
                        <p class="card-text text-muted small">Check your WPM and accuracy with a countdown timer</p>
                        <button class="btn btn-outline-secondary btn-sm w-100 mt-3">Open Tool</button>
                    </div>
                </div>
            </div>
            <!-- My Progress -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">

                    </div>
                </div>
            </div>
            <!-- Live Mock Tracker -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title">Live Mock Tracker</h5>

                        <button class="btn btn-outline-secondary btn-sm w-100 mt-3">Check Tracker</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
